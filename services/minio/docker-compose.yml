name: local-minio

services:
  minio:
    image: ${MINIO_IMAGE}
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - ${MINIO_DATA_DIR}:/data
    restart: unless-stopped

  minio-init:
    image: ${MINIO_MC_IMAGE}
    depends_on:
      - minio
    environment:
      MINIO_API_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_DEFAULT_BUCKET: ${MINIO_DEFAULT_BUCKET}
    entrypoint: >
      /bin/sh -c '
      until /usr/bin/mc alias set local "$$MINIO_API_ENDPOINT" "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
        echo "waiting for minio...";
        sleep 2;
      done;
      /usr/bin/mc mb --ignore-existing "local/$$MINIO_DEFAULT_BUCKET";
      /usr/bin/mc ls local;
      '
    restart: "no"
